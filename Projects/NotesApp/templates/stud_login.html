{% extends 'base.html' %}

{% block title %}Student Login{% endblock %}

{% block content %}
<div class="auth-header">
    <h1>Student Login</h1>
    <p>Access your notes and dashboard</p>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" required placeholder="Enter your username">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" required placeholder="Enter your password">
    </div>
    <button type="submit" class="btn-primary">Login</button>
</form>

<div class="auth-footer">
    <p>Don't have an account? <a href="{% url 'stud-signup' %}">Sign Up</a></p>
    <p style="margin-top: 10px;"><a href="/" style="color: var(--text-muted); font-size: 0.75rem;">Back to Home</a></p>
</div>
{% endblock %}
