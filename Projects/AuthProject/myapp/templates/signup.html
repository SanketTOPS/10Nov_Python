<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

        <h2 class="text-2xl font-bold text-center text-gray-700 mb-6">
            Create Your Account
        </h2>

        <form action="#" method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-gray-600 mb-1">Full Name</label>
                <input type="text" name="fullname" placeholder="Enter your name"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-600 mb-1">Email Address</label>
                <input type="email" name="email" placeholder="Enter your email"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-600 mb-1">Password</label>
                <input type="password" name="password" placeholder="Create password"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-600 mb-1">City</label>
                <input type="text" name="city" placeholder="Enter your city"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div>
                <label class="block text-gray-600 mb-1">Mobile Number</label>
                <input type="tel" name="mobile" placeholder="Enter mobile number"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <button type="submit" class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
                Sign Up
            </button>

        </form>

        <p class="text-center text-gray-500 text-sm mt-5">
            Already have an account?
            <a href="/" class="text-blue-500 hover:underline">Login</a>
        </p>

    </div>

</body>

</html>
