<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { padding: 30px; text-align: center; color: #ffffff; }
        .header.approved { background-color: #10b981; }
        .header.rejected { background-color: #ef4444; }
        .content { padding: 40px; text-align: center; color: #334155; }
        .status-badge { display: inline-block; padding: 8px 16px; border-radius: 999px; font-weight: 700; text-transform: uppercase; font-size: 14px; margin-bottom: 20px; }
        .status-badge.approved { background: #10b98122; color: #10b981; }
        .status-badge.rejected { background: #ef444422; color: #ef4444; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; background: #f8fafc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header {{ status }}">
            <h1>Note Review Update</h1>
        </div>
        <div class="content">
            <p>Hello <strong>{{ student_name }}</strong>,</p>
            <p>The status of your submitted note has been updated.</p>
            
            <div style="margin: 30px 0; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; text-align: left;">
                <p style="margin: 0; color: #64748b; font-size: 13px;">Note Title</p>
                <p style="margin: 5px 0 15px 0; font-weight: 600; font-size: 18px;">{{ note_title }}</p>
                
                <p style="margin: 0; color: #64748b; font-size: 13px;">Current Status</p>
                <div class="status-badge {{ status }}">{{ status }}</div>
            </div>

            <p>Log in to your dashboard to view more details.</p>
        </div>
        <div class="footer">
            &copy; 2026 NotesApp | Study Hard, Share Well.
        </div>
    </div>
</body>
</html>
