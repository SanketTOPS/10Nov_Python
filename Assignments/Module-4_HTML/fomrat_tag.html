<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatting Tag Example</title>
</head>

<body>
    <center>
        <h1>Formatting Tag in HTML</h1>
    </center>
    <hr>
    <b>This is Bold</b> <br>
    <i>This is Italic</i> <br>
    <u>This is Underline</u><br>
    <mark>This is Important</mark> <br>
    <small>This is Small</small> <br>
    <big>This is Big</big> <br>
    <del>50%</del> <br>
    <strong>This is Strong</strong> <br>
    <strike>60%</strike>
</body>

</html>
