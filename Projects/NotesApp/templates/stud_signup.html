{% extends 'base.html' %}

{% block title %}Student Signup{% endblock %}

{% block content %}
<div class="auth-header">
    <h1>Create Account</h1>
    <p>Join the student community</p>
</div>

<form method="POST">
    {% csrf_token %}
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" required placeholder="Choose a username">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" required placeholder="Create a password">
    </div>
    <button type="submit" class="btn-primary">Sign Up</button>
</form>

<div class="auth-footer">
    <p>Already have an account? <a href="{% url 'stud-login' %}">Login</a></p>
</div>
{% endblock %}
