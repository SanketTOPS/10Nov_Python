{% extends 'crud_app/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-lg border-0">
            <h2 class="fw-bold mb-4 text-center">Welcome Back</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary py-2 fw-bold">Login</button>
                </div>
            </form>
            <div class="text-center mt-4 text-muted">
                Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign Up</a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
