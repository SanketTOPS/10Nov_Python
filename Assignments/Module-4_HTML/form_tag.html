<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag in HTML</title>
</head>

<body>
    <center>
        <h1>Form Tag in HTML</h1>
    </center>
    <hr>
    <form>
        <input type="text" placeholder="Name"> <br> <br>
        <input type="email" placeholder="Email"> <br> <br>
        <input type="number" placeholder="Mobile"> <br> <br>
        <input type="password" placeholder="Password"> <br> <br>
        <input type="date" placeholder="DOB"> <br> <br>
        <input type="radio" name="gen" checked>Male
        <input type="radio" name="gen">Female <br> <br>
        <input type="checkbox">Gujrati <br><br>
        <input type="checkbox">Hindi <br><br>
        <input type="checkbox">English <br><br>
        <select name="" id="">
            <option value="">Selct your city</option>
            <option value="">Rajkot</option>
            <option value="">Ahmedabad</option>
            <option value="">Baroda</option>
        </select> <br><br>
        <textarea placeholder="Address"></textarea> <br> <br>
        <input type="submit" value="Save">
        <input type="reset" name="" id="">
        <input type="button" value="Test">
    </form>
</body>

</html>
