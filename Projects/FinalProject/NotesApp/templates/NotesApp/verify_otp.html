{% extends 'NotesApp/base.html' %}

{% block title %}Verify OTP - NotesApp{% endblock %}

{% block content %}
<div class="flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transform transition-all hover:shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Verify Your Email</h2>
            <p class="mt-2 text-sm text-gray-600">Please enter the 6-digit code sent to your email.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="otp" class="block text-sm font-semibold text-gray-700 mb-1">Enter OTP</label>
                <input type="text" name="otp" id="otp" maxlength="6" required
                    class="w-full px-4 py-3 text-center text-3xl tracking-widest font-bold rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition-all outline-none"
                    placeholder="000000">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300 shadow-lg transform hover:-translate-y-1 active:scale-95">
                Verify OTP
            </button>
        </form>

        <div class="mt-8 text-center border-t pt-6">
            <p class="text-sm text-gray-600">Didn't receive the code?
                <a href="{% url 'register' %}"
                    class="font-bold text-blue-600 hover:text-blue-500 underline decoration-2 underline-offset-4">Register
                    again</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
